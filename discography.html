<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Discography</title>
  <link id="gfont-link" rel="stylesheet" href="" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:       #FF6B35;
      --radius:       12px;
      --transition:   0.2s ease;
      --font:         'Space Grotesk', sans-serif;
      --font-display: 'Bebas Neue', cursive;
    }

    [data-theme="dark"] {
      --bg:         #0A0A0A;
      --bg-card:    #111111;
      --bg-hover:   #1A1A1A;
      --bg-overlay: rgba(10,10,10,0.92);
      --text:       #F5F5F0;
      --muted:      #888882;
      --border:     rgba(255,255,255,0.07);
      --border-md:  rgba(255,255,255,0.13);
      --glass:      rgba(255,255,255,0.06);
      --glass-h:    rgba(255,255,255,0.10);
    }

    [data-theme="light"] {
      --bg:         #F2F1ED;
      --bg-card:    #FFFFFF;
      --bg-hover:   #E8E7E3;
      --bg-overlay: rgba(242,241,237,0.94);
      --text:       #111110;
      --muted:      #78776F;
      --border:     rgba(0,0,0,0.07);
      --border-md:  rgba(0,0,0,0.14);
      --glass:      rgba(0,0,0,0.05);
      --glass-h:    rgba(0,0,0,0.09);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 15px; line-height: 1.6;
      min-height: 100vh; overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── TOPBAR ──────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 32px;
      background: var(--bg-overlay); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 40px; font-family: var(--font);
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      border: 1px solid var(--border-md); background: none;
      color: var(--muted); cursor: pointer; text-decoration: none;
      transition: color var(--transition), border-color var(--transition);
    }
    .back-btn:hover { color: var(--text); border-color: var(--accent); }
    .back-btn svg { width: 13px; height: 13px; }

    .topbar-artist {
      font-family: var(--font-display); font-size: 20px;
      letter-spacing: 0.06em; color: var(--text);
    }

    .theme-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 40px; font-family: var(--font);
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      border: 1px solid var(--border-md); background: none;
      color: var(--muted); cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }
    .theme-btn:hover { color: var(--text); border-color: var(--accent); }
    .theme-btn svg { width: 13px; height: 13px; }

    /* ── HERO ────────────────────────────────────────── */
    .disco-hero {
      padding: 72px 32px 48px;
      text-align: center;
      max-width: 700px; margin: 0 auto;
    }

    .disco-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 12px;
    }

    .disco-title {
      font-family: var(--font-display);
      font-size: clamp(48px, 8vw, 80px);
      letter-spacing: 0.04em; line-height: 0.9; margin-bottom: 16px;
    }

    .disco-desc {
      font-size: 15px; color: var(--muted); line-height: 1.7;
    }

    /* ── GRID ────────────────────────────────────────── */
    .grid-section { max-width: 1100px; margin: 0 auto; padding: 0 32px 80px; }

    .release-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }

    .release-card {
      display: block; text-decoration: none;
      border-radius: var(--radius); overflow: hidden;
      background: var(--bg-card); border: 1px solid var(--border);
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      cursor: pointer; position: relative;
    }

    .release-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-md);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }

    .release-card.active-release {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .release-card.active-release:hover {
      box-shadow: 0 16px 40px rgba(0,0,0,0.3), 0 0 0 1px var(--accent);
    }

    .active-badge {
      position: absolute; top: 10px; right: 10px; z-index: 2;
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; background: var(--accent); color: #fff;
      padding: 3px 8px; border-radius: 20px;
    }

    .card-cover-wrap { position: relative; }

    .card-cover {
      width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
      background: var(--bg-hover);
    }

    .card-cover-placeholder {
      width: 100%; aspect-ratio: 1;
      background: linear-gradient(135deg, var(--bg-hover), var(--bg-card));
      display: flex; align-items: center; justify-content: center;
      font-size: 56px;
    }

    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.7) 100%);
      opacity: 0; transition: opacity var(--transition);
      display: flex; align-items: flex-end; padding: 14px;
    }
    .release-card:hover .card-overlay { opacity: 1; }

    .card-overlay-text {
      font-size: 12px; font-weight: 600; color: #fff;
      letter-spacing: 0.05em; text-transform: uppercase;
    }

    .card-body { padding: 16px; }

    .card-type {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
    }

    .card-title {
      font-family: var(--font-display); font-size: 20px;
      letter-spacing: 0.03em; color: var(--text); line-height: 1.1; margin-bottom: 4px;
    }

    .card-year { font-size: 12px; color: var(--muted); }

    /* ── FOOTER ──────────────────────────────────────── */
    .footer {
      border-top: 1px solid var(--border);
      padding: 24px 32px; text-align: center;
      color: var(--muted); font-size: 12px;
    }

    @media (max-width: 600px) {
      .topbar { padding: 12px 16px; }
      .disco-hero { padding: 48px 20px 32px; }
      .grid-section { padding: 0 16px 60px; }
      .release-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        Back
      </a>
      <span class="topbar-artist" id="topbar-artist">ARTIST</span>
    </div>
    <button class="theme-btn" id="theme-toggle">
      <svg id="icon-sun"  viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-12.37l-1.06 1.06a.996.996 0 0 0 0 1.41c.39.39 1.03.39 1.41 0l1.06-1.06a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0zM7.05 18.36l-1.06 1.06a.996.996 0 0 0 0 1.41c.39.39 1.03.39 1.41 0l1.06-1.06a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0z"/></svg>
      <svg id="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
      <span id="theme-label">Light</span>
    </button>
  </header>

  <!-- HERO -->
  <div class="disco-hero">
    <div class="disco-label">Full Catalogue</div>
    <h1 class="disco-title" id="disco-title">DISCOGRAPHY</h1>
    <p class="disco-desc" id="disco-desc"></p>
  </div>

  <!-- GRID -->
  <section class="grid-section">
    <div class="release-grid" id="release-grid"></div>
  </section>

  <div class="footer" id="footer"></div>

  <script src="config.js"></script>
  <script>
    (function () {
      const C = ARTIST_CONFIG;
      const T = C.theme;
      const root = document.documentElement;

      // Theme tokens
      root.style.setProperty('--accent',       T.accent);
      root.style.setProperty('--font',         T.font);
      root.style.setProperty('--font-display', T.fontDisplay);

      // Google Fonts
      const fontNames = [T.font, T.fontDisplay]
        .map(f => f.split(',')[0].replace(/['"]/g,'').trim()).filter(Boolean);
      document.getElementById('gfont-link').href =
        `https://fonts.googleapis.com/css2?${fontNames.map(f => `family=${encodeURIComponent(f).replace(/%20/g,'+')}&display=swap`).join('&')}`;

      // Dark/Light toggle
      const saved = localStorage.getItem('theme') || 'dark';
      root.setAttribute('data-theme', saved);
      const themeBtn  = document.getElementById('theme-toggle');
      const iconSun   = document.getElementById('icon-sun');
      const iconMoon  = document.getElementById('icon-moon');
      const themeLabel = document.getElementById('theme-label');

      function applyTheme(t) {
        root.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        iconSun.style.display  = t === 'dark' ? 'none'  : 'block';
        iconMoon.style.display = t === 'dark' ? 'block' : 'none';
        themeLabel.textContent = t === 'dark' ? 'Light' : 'Dark';
      }
      applyTheme(saved);
      themeBtn.addEventListener('click', () => applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

      // Header
      document.getElementById('topbar-artist').textContent  = C.artistName;
      document.getElementById('page-title').textContent     = `${C.artistName} — Discography`;
      document.getElementById('disco-title').textContent    = `${C.artistName}`;
      document.getElementById('disco-desc').textContent     = `${C.discography?.length || 0} releases`;

      // Build grid
      const grid = document.getElementById('release-grid');
      const releases = C.discography || [];

      if (!releases.length) {
        grid.innerHTML = `<p style="color:var(--muted);grid-column:1/-1;padding:40px 0;text-align:center">No discography entries found in config.js.</p>`;
      } else {
        releases.forEach(rel => {
          const card = document.createElement('a');
          card.href      = rel.url || '#';
          card.className = 'release-card' + (rel.isActive ? ' active-release' : '');

          card.innerHTML = `
            ${rel.isActive ? '<span class="active-badge">Latest</span>' : ''}
            <div class="card-cover-wrap">
              <div class="card-cover-placeholder" id="ph-${Math.random().toString(36).slice(2)}">🎵</div>
              <img class="card-cover" src="${rel.cover || ''}" alt="${rel.title}" style="display:none"
                   onload="this.style.display='block';this.previousElementSibling.style.display='none'"
                   onerror="this.style.display='none'" />
              <div class="card-overlay">
                <span class="card-overlay-text">${rel.isActive ? 'Current release' : 'View release'} →</span>
              </div>
            </div>
            <div class="card-body">
              <div class="card-type">${rel.type}</div>
              <div class="card-title">${rel.title}</div>
              <div class="card-year">${rel.year}</div>
            </div>`;

          grid.appendChild(card);
        });
      }

      document.getElementById('footer').textContent = C.footerText || `© ${C.releaseYear} ${C.artistName}`;
    })();
  </script>
</body>
</html>
