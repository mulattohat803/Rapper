<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Loading...</title>
  <meta name="description" id="page-desc" content="" />
  <meta property="og:type"        content="music.album" />
  <meta property="og:title"       id="og-title"  content="" />
  <meta property="og:description" id="og-desc"   content="" />
  <meta property="og:image"       id="og-image"  content="" />
  <link id="gfont-link" rel="stylesheet" href="" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:       #FF6B35;
      --accent-glow:  #FF6B3540;
      --radius:       12px;
      --transition:   0.2s ease;
      --font:         'Space Grotesk', sans-serif;
      --font-display: 'Bebas Neue', cursive;
    }

    [data-theme="dark"] {
      --bg:          #0A0A0A;
      --bg-card:     #111111;
      --bg-hover:    #1A1A1A;
      --bg-overlay:  rgba(10,10,10,0.92);
      --text:        #F5F5F0;
      --muted:       #888882;
      --border:      rgba(255,255,255,0.07);
      --border-md:   rgba(255,255,255,0.13);
      --glass:       rgba(255,255,255,0.06);
      --glass-h:     rgba(255,255,255,0.10);
    }

    [data-theme="light"] {
      --bg:          #F2F1ED;
      --bg-card:     #FFFFFF;
      --bg-hover:    #E8E7E3;
      --bg-overlay:  rgba(242,241,237,0.94);
      --text:        #111110;
      --muted:       #78776F;
      --border:      rgba(0,0,0,0.07);
      --border-md:   rgba(0,0,0,0.14);
      --glass:       rgba(0,0,0,0.05);
      --glass-h:     rgba(0,0,0,0.09);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── TOPBAR ──────────────────────────────────────── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; justify-content: flex-end; align-items: center; gap: 10px;
      padding: 14px 24px; pointer-events: none;
    }
    .topbar-btn {
      pointer-events: all;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 40px;
      font-family: var(--font); font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      border: 1px solid var(--border-md); background: var(--bg-overlay);
      color: var(--muted); cursor: pointer;
      backdrop-filter: blur(14px);
      transition: color var(--transition), border-color var(--transition);
      text-decoration: none;
    }
    .topbar-btn:hover { color: var(--text); border-color: var(--accent); }
    .topbar-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── PRESAVE BANNER ──────────────────────────────── */
    #presave-banner {
      display: none; position: relative; z-index: 10;
      background: var(--accent); color: #fff;
      text-align: center; padding: 16px 20px;
    }
    #presave-banner.active { display: block; }

    .presave-headline { font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.9; }
    .presave-title { font-family: var(--font-display); font-size: 28px; letter-spacing: 0.04em; line-height: 1; margin: 4px 0 12px; }

    .countdown-row { display: flex; justify-content: center; align-items: center; gap: 4px; margin-bottom: 14px; }
    .countdown-unit {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(0,0,0,0.2); border-radius: 8px; padding: 6px 14px; min-width: 56px;
    }
    .countdown-num { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
    .countdown-lbl { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.75; margin-top: 3px; }
    .countdown-sep { font-size: 22px; font-weight: 700; opacity: 0.4; padding-bottom: 14px; }

    .presave-cta-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
    .presave-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 40px;
      font-family: var(--font); font-size: 12px; font-weight: 700; letter-spacing: 0.04em;
      text-decoration: none; border: 2px solid rgba(255,255,255,0.45);
      color: #fff; background: rgba(255,255,255,0.12);
      transition: background 0.15s; cursor: pointer;
    }
    .presave-btn:hover { background: rgba(255,255,255,0.26); }
    .presave-btn svg { width: 13px; height: 13px; }

    /* ── HERO ────────────────────────────────────────── */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: flex-end;
      padding: 0 0 64px; overflow: hidden;
    }
    [data-theme="light"] .hero { min-height: 72vh; }

    .hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center top;
      filter: blur(22px) brightness(0.32) saturate(1.5);
      transform: scale(1.08); z-index: 0;
    }
    [data-theme="light"] .hero-bg { filter: blur(22px) brightness(0.5) saturate(1.3); }

    .hero-gradient {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.2) 40%, var(--bg) 100%);
    }

    .hero-content {
      position: relative; z-index: 2; width: 100%; max-width: 1100px;
      margin: 0 auto; padding: 0 32px; display: flex; align-items: flex-end; gap: 48px;
    }

    .cover-wrap { flex-shrink: 0; }
    .cover-art {
      width: clamp(180px, 22vw, 280px); aspect-ratio: 1; border-radius: var(--radius);
      object-fit: cover; display: block;
      box-shadow: 0 32px 80px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.07);
    }
    .cover-placeholder {
      width: clamp(180px, 22vw, 280px); aspect-ratio: 1; border-radius: var(--radius);
      background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 64px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.75), 0 0 0 1px var(--border-md);
    }

    .hero-meta { flex: 1; padding-bottom: 8px; }

    .project-type-badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); border: 1px solid var(--accent);
      padding: 3px 10px; border-radius: 20px; margin-bottom: 14px;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(42px, 8vw, 88px); line-height: 0.9;
      letter-spacing: 0.02em; margin-bottom: 6px;
      color: #fff;
    }

    .hero-artist {
      font-size: clamp(15px, 2vw, 19px); color: rgba(255,255,255,0.65);
      letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; margin-bottom: 16px;
    }

    .hero-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 28px; }
    .hero-stat { display: flex; flex-direction: column; gap: 2px; }
    .hero-stat-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
    .hero-stat-value { font-size: 14px; font-weight: 600; color: #fff; }
    .hero-desc { font-size: 14px; color: rgba(255,255,255,0.6); max-width: 520px; line-height: 1.7; margin-bottom: 28px; }

    /* ── STREAMING BUTTONS ───────────────────────────── */
    .streaming-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn-stream {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px; border-radius: 40px; font-size: 13px; font-weight: 600;
      letter-spacing: 0.03em; text-decoration: none; transition: var(--transition);
      cursor: pointer; white-space: nowrap;
    }
    .btn-stream.primary { background: var(--accent); color: #fff; border: none; }
    .btn-stream.primary:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .btn-stream.outline { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    .btn-stream.outline:hover { background: rgba(255,255,255,0.18); transform: translateY(-1px); }
    .btn-stream svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── MAIN ────────────────────────────────────────── */
    .main { max-width: 1100px; margin: 0 auto; padding: 0 32px 80px; }

    .section-label {
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); font-weight: 600; margin-bottom: 20px;
      padding-top: 56px; display: flex; align-items: center; gap: 12px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── TRACKLIST ───────────────────────────────────── */
    .tracklist { display: flex; flex-direction: column; gap: 2px; }

    .track-row {
      display: grid; grid-template-columns: 36px 1fr auto;
      align-items: center; gap: 16px;
      padding: 12px 16px; border-radius: 8px;
      transition: background var(--transition); position: relative;
    }
    .track-row.clickable { cursor: pointer; }
    .track-row:hover { background: var(--bg-hover); }
    .track-row.active { background: var(--bg-card); }
    .track-row.active::before {
      content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
      width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
    }

    .track-num { font-size: 13px; color: var(--muted); text-align: center; font-variant-numeric: tabular-nums; transition: var(--transition); }
    .track-row.active .track-num, .track-row:hover .track-num { color: var(--accent); }
    .track-row.playing .track-num { display: none; }
    .track-row.playing .playing-bars { display: flex; }

    .playing-bars { display: none; align-items: flex-end; justify-content: center; gap: 2px; height: 14px; width: 36px; }
    .playing-bars span { width: 3px; background: var(--accent); border-radius: 2px; animation: soundbar 0.8s ease-in-out infinite; }
    .playing-bars span:nth-child(2) { animation-delay: 0.15s; }
    .playing-bars span:nth-child(3) { animation-delay: 0.30s; }
    .playing-bars span:nth-child(4) { animation-delay: 0.45s; }
    @keyframes soundbar { 0%,100%{height:4px} 50%{height:14px} }

    .track-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .track-title-row { display: flex; align-items: center; gap: 8px; }
    .track-title { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-row.active .track-title { color: var(--accent); }
    .explicit-badge { flex-shrink: 0; font-size: 9px; font-weight: 700; background: var(--muted); color: var(--bg); padding: 1px 4px; border-radius: 3px; }
    .track-feat { font-size: 12px; color: var(--muted); }

    .track-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .track-actions { display: flex; gap: 5px; opacity: 0; transition: opacity var(--transition); }
    .track-row:hover .track-actions { opacity: 1; }

    .track-icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--glass); border: none; cursor: pointer;
      transition: background var(--transition); text-decoration: none;
    }
    .track-icon-btn:hover { background: var(--glass-h); }
    .track-icon-btn svg { width: 13px; height: 13px; fill: var(--muted); }
    .track-icon-btn:hover svg { fill: var(--text); }

    .track-icon-btn.embed-trigger { background: var(--accent); }
    .track-icon-btn.embed-trigger svg { fill: #fff; }
    .track-icon-btn.embed-trigger:hover { filter: brightness(1.15); background: var(--accent); }

    .track-duration { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 36px; text-align: right; }

    /* ── EMBED MODAL ─────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.78); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--bg-card); border: 1px solid var(--border-md);
      border-radius: 16px; width: 100%; max-width: 640px; overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,0.6);
      animation: modal-in 0.2s ease;
    }
    @keyframes modal-in { from { opacity:0; transform: scale(0.96) translateY(8px); } to { opacity:1; transform: none; } }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .modal-track-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .modal-close {
      background: none; border: none; cursor: pointer; color: var(--muted);
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: background var(--transition), color var(--transition);
    }
    .modal-close:hover { background: var(--bg-hover); color: var(--text); }
    .modal-close svg { width: 16px; height: 16px; }

    .modal-tabs { display: flex; gap: 4px; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .modal-tab {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 6px; font-family: var(--font);
      font-size: 12px; font-weight: 600; cursor: pointer; border: none;
      background: none; color: var(--muted);
      transition: background var(--transition), color var(--transition);
    }
    .modal-tab:hover { background: var(--bg-hover); color: var(--text); }
    .modal-tab.active { background: var(--accent); color: #fff; }
    .modal-tab svg { width: 12px; height: 12px; fill: currentColor; }

    .modal-body { min-height: 180px; background: var(--bg); }
    .modal-body iframe { width: 100%; border: none; display: block; }
    .modal-link-fallback {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; padding: 44px 24px;
      color: var(--muted); font-size: 14px; text-align: center;
    }
    .modal-link-fallback a {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 22px; border-radius: 40px;
      background: var(--accent); color: #fff;
      font-weight: 600; text-decoration: none; font-size: 13px;
    }

    /* ── PLAYER BAR ──────────────────────────────────── */
    .player-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg-overlay); backdrop-filter: blur(24px) saturate(1.4);
      border-top: 1px solid var(--border); padding: 10px 24px;
      z-index: 100; transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .player-bar.visible { transform: translateY(0); }

    .player-inner {
      max-width: 1100px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 24px;
    }

    .player-track-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .player-cover { width: 42px; height: 42px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
    .player-cover-placeholder { width: 42px; height: 42px; border-radius: 6px; background: var(--bg-hover); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .player-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-artist { font-size: 12px; color: var(--muted); }

    .player-controls { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .player-btns { display: flex; align-items: center; gap: 8px; }

    .ctrl-btn {
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      transition: color var(--transition), background var(--transition);
    }
    .ctrl-btn:hover { color: var(--text); background: var(--glass); }
    .ctrl-btn svg { width: 16px; height: 16px; }

    .play-btn {
      width: 38px; height: 38px; border-radius: 50%; background: var(--accent);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: filter var(--transition), transform var(--transition); color: #fff;
    }
    .play-btn:hover { filter: brightness(1.12); transform: scale(1.05); }
    .play-btn svg { width: 16px; height: 16px; }

    /* Waveform progress */
    .waveform-row { display: flex; align-items: center; gap: 10px; width: 340px; max-width: 100%; }
    .time-label { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 32px; }
    .time-label.right { text-align: right; }
    #waveform-canvas { flex: 1; height: 36px; cursor: pointer; border-radius: 3px; display: block; }

    .player-right { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
    .volume-row { display: flex; align-items: center; gap: 8px; }
    .volume-row svg { width: 14px; height: 14px; color: var(--muted); flex-shrink: 0; }
    input[type="range"].vol-slider { -webkit-appearance: none; width: 80px; height: 3px; background: var(--glass-h); border-radius: 2px; cursor: pointer; accent-color: var(--accent); }

    /* ── CREDITS ─────────────────────────────────────── */
    .credits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .credit-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
    .credit-role { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .credit-name { font-size: 15px; font-weight: 600; color: var(--text); }

    /* ── SOCIAL / FOOTER ─────────────────────────────── */
    .social-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .social-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 40px; font-size: 13px; font-weight: 500; text-decoration: none; background: var(--bg-card); color: var(--muted); border: 1px solid var(--border); transition: var(--transition); }
    .social-btn:hover { color: var(--text); border-color: var(--border-md); transform: translateY(-1px); }
    .social-btn svg { width: 15px; height: 15px; }

    .footer { border-top: 1px solid var(--border); margin-top: 60px; padding: 28px 0 100px; text-align: center; color: var(--muted); font-size: 12px; }
    .footer a { color: var(--accent); text-decoration: none; }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 700px) {
      .hero-content { flex-direction: column; align-items: flex-start; padding: 0 20px; gap: 24px; }
      .hero { min-height: unset; padding-top: 80px; padding-bottom: 40px; }
      .main { padding: 0 20px 80px; }
      .player-inner { grid-template-columns: 1fr; gap: 8px; }
      .player-right { justify-content: center; }
      .player-track-info { justify-content: center; }
      .waveform-row { width: 100%; }
      .topbar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <a href="discography.html" class="topbar-btn" id="disco-link">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
      Discography
    </a>
    <button class="topbar-btn" id="theme-toggle">
      <svg id="icon-sun"  viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-12.37l-1.06 1.06a.996.996 0 0 0 0 1.41c.39.39 1.03.39 1.41 0l1.06-1.06a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0zM7.05 18.36l-1.06 1.06a.996.996 0 0 0 0 1.41c.39.39 1.03.39 1.41 0l1.06-1.06a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0z"/></svg>
      <svg id="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
      <span id="theme-label">Light</span>
    </button>
  </div>

  <!-- PRE-SAVE BANNER -->
  <div id="presave-banner">
    <div class="presave-headline">Coming Soon</div>
    <div class="presave-title" id="presave-title-text"></div>
    <div class="countdown-row" id="countdown-row"></div>
    <div class="presave-cta-row" id="presave-cta-row"></div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content">
      <div class="cover-wrap">
        <div class="cover-placeholder" id="cover-placeholder">🎵</div>
        <img class="cover-art" id="cover-img" src="" alt="" style="display:none" />
      </div>
      <div class="hero-meta">
        <div class="project-type-badge" id="badge-type">MIXTAPE</div>
        <h1 class="hero-title" id="hero-title">LOADING</h1>
        <div class="hero-artist" id="hero-artist">Artist Name</div>
        <div class="hero-stats">
          <div class="hero-stat"><span class="hero-stat-label">Year</span><span class="hero-stat-value" id="stat-year">—</span></div>
          <div class="hero-stat"><span class="hero-stat-label">Tracks</span><span class="hero-stat-value" id="stat-tracks">—</span></div>
          <div class="hero-stat"><span class="hero-stat-label">Genre</span><span class="hero-stat-value" id="stat-genre">—</span></div>
        </div>
        <p class="hero-desc" id="hero-desc"></p>
        <div class="streaming-row" id="streaming-row"></div>
      </div>
    </div>
  </section>

  <!-- MAIN -->
  <main class="main">
    <div class="section-label">Tracklist</div>
    <div class="tracklist" id="tracklist"></div>
    <div class="section-label" id="credits-label" style="display:none">Credits</div>
    <div class="credits-grid" id="credits-grid"></div>
    <div class="section-label" id="social-label" style="display:none">Follow</div>
    <div class="social-row" id="social-row"></div>
    <div class="footer" id="footer"></div>
  </main>

  <!-- EMBED MODAL -->
  <div class="modal-overlay" id="embed-modal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-track-name" id="modal-track-name">Track</span>
        <button class="modal-close" id="modal-close">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="modal-tabs" id="modal-tabs"></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- PLAYER BAR -->
  <div class="player-bar" id="player-bar">
    <div class="player-inner">
      <div class="player-track-info">
        <div class="player-cover-placeholder" id="player-cover-placeholder">🎵</div>
        <img class="player-cover" id="player-cover-img" src="" alt="" style="display:none" />
        <div>
          <div class="player-name" id="player-track-name">—</div>
          <div class="player-artist" id="player-artist-name">—</div>
        </div>
      </div>
      <div class="player-controls">
        <div class="player-btns">
          <button class="ctrl-btn" id="btn-prev" title="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="play-btn" id="btn-play" title="Play/Pause">
            <svg id="icon-play"  viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-next" title="Next">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6 6-4.25V16.25L8.5 12zM16 6h2v12h-2z"/></svg>
          </button>
        </div>
        <div class="waveform-row">
          <span class="time-label" id="time-current">0:00</span>
          <canvas id="waveform-canvas"></canvas>
          <span class="time-label right" id="time-total">0:00</span>
        </div>
      </div>
      <div class="player-right">
        <div class="volume-row">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          <input type="range" class="vol-slider" id="vol-slider" min="0" max="1" step="0.01" value="1" />
        </div>
      </div>
    </div>
  </div>

  <audio id="audio-player" preload="metadata" crossorigin="anonymous"></audio>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
